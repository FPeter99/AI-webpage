<script>



function checkUser(){


const token =
localStorage.getItem("token");


if(!token){

window.location.href="login.html";

return;

}



const user =
JSON.parse(
localStorage.getItem("user")
);



if(user){

document.getElementById(
"userInfo"
).innerText =
user.email;

}


}




checkUser();






const menuButton =
document.getElementById(
"menuButton"
);



const sideMenu =
document.getElementById(
"sideMenu"
);



menuButton.onclick = ()=>{


sideMenu.classList.toggle(
"open"
);


menuButton.classList.toggle(
"active"
);


};



</script>
