<!DOCTYPE html>
<html lang="hu">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Hub</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<aside class="sidebar">


<div class="logo">

<span>✦</span>

AI Hub

</div>


<p class="subtitle">
Choose your AI assistant
</p>



<div class="bots">


<button class="bot active">

💻 AI Programmer

</button>


<button class="bot">

📈 Investment Banker

</button>


<button class="bot">

📐 Math Teacher

</button>


<button class="bot">

🧠 Custom AI

</button>


</div>



<div class="footer">

Powered by AI

</div>


</aside>




<main class="chat">


<header class="chat-header">


<h1>

<span id="botIcon">
💻
</span>


<span id="botName">
AI Programmer
</span>


</h1>



<div id="userInfo">

</div>



<div class="status">

● Online

</div>


</header>





<div id="messages" class="messages">


<div class="message ai">


<div class="avatar">

AI

</div>


<div class="bubble">

Hello! How can I help you today?

</div>


</div>


</div>





<div class="input-area">


<textarea
id="input"
placeholder="Write your message..."
></textarea>



<button id="send">

➤

</button>


</div>



</main>


</div>



<script src="./src/auth.js"></script>
<script src="./src/script.js"></script>

<script>

async function checkUser(){

    const token = localStorage.getItem("token");


    if(!token){

        window.location.href="login.html";

        return;
    }


    const user =
        JSON.parse(localStorage.getItem("user"));


    console.log(
        "Belépve:",
        user.email
    );

}


checkUser();



</script>
</body>


</html>
